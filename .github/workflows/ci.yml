name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Sync dependencies
        run: pdm sync -G dev -G test

      - name: Ruff check
        run: pdm run ruff check src tests

      - name: Ruff format
        run: pdm run ruff format --check src tests

      - name: Mypy
        run: pdm run mypy src/jupyter_base

      - name: Pytest
        run: pdm run pytest --cov=jupyter_base --cov-report=term-missing --cov-report=xml

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Jupyter image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: jupyter-base:jupyter-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
